<div class="tasks">
  <div class="task-add">
    <input type="text" placeholder="Add a task…" autocomplete="off">
    <button>+ Add</button>
  </div>
  <p class="task-stats"></p>
  <ul></ul>
  <p class="task-empty">No tasks yet</p>
  <div class="task-footer">
    <p class="task-total_time">Total Time: <span id="time">0s</span></p>
    <button class="task-clear">Clear done</button>
  </div>
</div>
