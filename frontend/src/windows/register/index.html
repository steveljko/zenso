<div class="register">
  <form class="register-form" autocomplete="off" novalidate>
    <div class="form-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="John Doe" autocomplete="off" />
      <span class="error" data-field="name"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="john@doe.com" autocomplete="off" />
      <span class="error" data-field="email"></span>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" type="password" placeholder="••••••••" autocomplete="off" />
        <button type="button" class="register-toggle-pw" tabindex="-1">Show</button>
      </div>
      <span class="error" data-field="password"></span>
    </div>

    <x-button full>Create Account</x-button>
  </form>
</div>
